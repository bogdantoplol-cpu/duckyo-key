<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duckyo Key System</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(0,255,120,0.12), transparent 35%),
        linear-gradient(135deg, #050505, #0b0b0b, #101510);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(0, 255, 100, 0.08);
      filter: blur(120px);
      border-radius: 50%;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      background: rgba(8, 8, 8, 0.96);
      border: 1px solid rgba(0,255,100,0.25);
      border-radius: 24px;
      padding: 34px;
      text-align: center;
      box-shadow:
        0 0 25px rgba(0,255,100,0.10),
        0 0 60px rgba(0,0,0,0.55);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #7CFF9E;
      text-shadow: 0 0 12px rgba(0,255,100,0.35);
    }

    .subtitle {
      color: #b6c2b8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 26px;
    }

    .key-box {
      background: linear-gradient(180deg, #0b0f0b, #0a0a0a);
      border: 1px solid rgba(0,255,100,0.18);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: inset 0 0 18px rgba(0,255,100,0.06);
    }

    .label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7fa08a;
      margin-bottom: 10px;
    }

    .key {
      font-size: 28px;
      font-weight: bold;
      color: #00ff7b;
      text-shadow: 0 0 10px rgba(0,255,123,0.25);
      word-break: break-word;
    }

    .timer {
      margin-top: 16px;
      color: #d7e2d8;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 22px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .main-btn {
      background: linear-gradient(90deg, #00c853, #00ff7b);
      color: #041106;
      box-shadow: 0 0 16px rgba(0,255,100,0.25);
    }

    .main-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 22px rgba(0,255,100,0.35);
    }

    .secondary-btn {
      background: #111;
      color: #98f5b2;
      border: 1px solid rgba(0,255,100,0.18);
    }

    .secondary-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(0,255,100,0.35);
      box-shadow: 0 0 18px rgba(0,255,100,0.15);
    }

    .status {
      min-height: 22px;
      margin-top: 16px;
      font-size: 14px;
      color: #00ff7b;
    }

    .status.error {
      color: #ff6b6b;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #8ea291;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="card">
    <h1>Duckyo Key System</h1>
    <p class="subtitle">
      Get the active key below.<br>
      The key updates automatically every 3 days.
    </p>

    <div class="key-box">
      <div class="label">Current Active Key</div>
      <div class="key" id="currentKey">Loading...</div>
      <div class="timer" id="timer">Checking next rotation...</div>
    </div>

    <div class="buttons">
      <button class="main-btn" onclick="showKey()">Get Key</button>
      <button class="secondary-btn" onclick="copyKey()">Copy Key</button>
    </div>

    <div class="status" id="status"></div>

    <div class="footer">
      Keys rotate every 3 days.<br>
      Always use the currently active key.
    </div>
  </div>

  <script>
    const keyFileUrl = "https://raw.githubusercontent.com/bogdantoplol-cpu/duckyo-key/refs/heads/main/key.txt";

    let activeKey = "";
    let loadedKeys = [];
    let timerStarted = false;

    async function loadKeys() {
      try {
        const response = await fetch(keyFileUrl + "?t=" + Date.now());
        if (!response.ok) throw new Error("Failed to load keys");

        const text = await response.text();

        loadedKeys = text
          .split(/[\n\r\s]+/)
          .map(k => k.trim())
          .filter(Boolean);

        if (loadedKeys.length === 0) {
          throw new Error("No keys found in key.txt");
        }

        updateCurrentKey();

        if (!timerStarted) {
          timerStarted = true;
          setInterval(updateCurrentKey, 1000);
        }
      } catch (err) {
        document.getElementById("currentKey").textContent = "Error";
        document.getElementById("timer").textContent = "Could not load keys.";
        setStatus(err.message, true);
      }
    }

    function getRotationIndex() {
      const now = new Date();
      const daysSinceEpoch = Math.floor(now.getTime() / (1000 * 60 * 60 * 24));
      return Math.floor(daysSinceEpoch / 3) % loadedKeys.length;
    }

    function getNextRotationTime() {
      const now = new Date();
      const msPerDay = 24 * 60 * 60 * 1000;
      const daysSinceEpoch = Math.floor(now.getTime() / msPerDay);
      const nextRotationDay = (Math.floor(daysSinceEpoch / 3) + 1) * 3;
      return new Date(nextRotationDay * msPerDay);
    }

    function updateCurrentKey() {
      if (loadedKeys.length === 0) return;

      const index = getRotationIndex();
      activeKey = loadedKeys[index];
      document.getElementById("currentKey").textContent = activeKey;

      const now = new Date();
      const nextRotation = getNextRotationTime();
      const diff = nextRotation - now;

      const totalSeconds = Math.max(0, Math.floor(diff / 1000));
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("timer").textContent =
        `Next key update in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    function showKey() {
      if (!activeKey) return;
      document.getElementById("currentKey").textContent = activeKey;
      setStatus("Current key loaded.");
    }

    async function copyKey() {
      if (!activeKey) return;

      try {
        await navigator.clipboard.writeText(activeKey);
        setStatus("Key copied to clipboard.");
      } catch {
        setStatus("Failed to copy key.", true);
      }
    }

    function setStatus(message, isError = false) {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = isError ? "status error" : "status";
    }

    loadKeys();
  </script>
</body>
</html>
